name: Task
description: Track an implementation task
title: "Task: "
labels:
  - task
body:
  - type: textarea
    id: scope
    attributes:
      label: Task scope
      description: What needs to be done?
      placeholder: Describe the implementation task.
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: Expected outputs.
      placeholder: |
        - Code changes
        - Tests
        - Documentation
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
      description: Who is responsible?
      placeholder: @username
